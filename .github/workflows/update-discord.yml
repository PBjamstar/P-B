name: Update Discord Data

on:
  schedule:
    - cron: '0 * * * *'  # Hourly fallback
  workflow_dispatch:       # Triggered by bot in real-time

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install node-fetch@2

      - name: Fetch Discord data
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GUILD_ID: ${{ secrets.GUILD_ID }}
        run: node fetch-discord-data.js

      - name: Commit and push data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git stash
          git pull --rebase origin main
          git stash pop
          git add data/
          git diff --staged --quiet || git commit -m 'chore: update Discord data'
          git push
