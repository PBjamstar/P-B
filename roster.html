<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster — Phantom Bloodline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --blood:#7a0000; --blood-mid:#a01010; --blood-bright:#c0392b;
  --gold:#c9a84c; --gold-dim:#7a5f28;
  --smoke:#080808; --ash:#111; --coal:#1a1a1a; --fog:#222;
  --bone:#e8dcc8; --pale:#9a8870; --white:#f5f0e8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--smoke); color:var(--bone); font-family:'Crimson Pro',serif; font-size:18px; line-height:1.7; min-height:100vh; }

nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  padding:1.2rem 3rem; display:flex; justify-content:space-between; align-items:center;
  background:rgba(5,5,5,0.97); border-bottom:1px solid rgba(122,0,0,0.2);
}
.nav-brand { font-family:'Cinzel',serif; font-weight:900; font-size:0.9rem; color:var(--gold); text-decoration:none; letter-spacing:0.2em; }
.nav-back { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.2em; color:var(--pale); text-decoration:none; text-transform:uppercase; transition:color 0.2s; }
.nav-back:hover { color:var(--white); }

.page-wrap { max-width:1000px; margin:0 auto; padding:8rem 2rem 4rem; }

.page-header { text-align:center; margin-bottom:3.5rem; }
.eyebrow { font-family:'Share Tech Mono',monospace; font-size:0.65rem; letter-spacing:0.4em; color:var(--blood-bright); text-transform:uppercase; display:block; margin-bottom:0.8rem; }
.page-title { font-family:'Cinzel',serif; font-size:2.5rem; font-weight:700; color:var(--white); margin-bottom:1rem; }

.stats-bar {
  display:flex; justify-content:center; gap:3rem; margin-bottom:3.5rem;
  padding:1.5rem; border:1px solid rgba(122,0,0,0.2); background:rgba(122,0,0,0.03);
  flex-wrap:wrap;
}
.stat-item { text-align:center; }
.stat-num { font-family:'Cinzel',serif; font-size:2rem; font-weight:900; color:var(--blood-bright); display:block; line-height:1; }
.stat-lbl { font-family:'Share Tech Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; color:var(--pale); text-transform:uppercase; margin-top:0.3rem; display:block; }

.updated {
  text-align:center; font-family:'Share Tech Mono',monospace; font-size:0.6rem;
  letter-spacing:0.15em; color:rgba(154,136,112,0.4); margin-bottom:3rem;
}

.rank-section { margin-bottom:2.5rem; }
.rank-header {
  display:flex; align-items:center; gap:1rem; padding:0.8rem 1.2rem;
  background:rgba(122,0,0,0.08); border-left:3px solid var(--blood);
  margin-bottom:1px; cursor:pointer; user-select:none; transition:background 0.2s;
}
.rank-header:hover { background:rgba(122,0,0,0.12); }
.rank-header-name {
  font-family:'Cinzel',serif; font-size:0.85rem; font-weight:700;
  color:var(--gold); letter-spacing:0.05em; flex:1;
}
.rank-count {
  font-family:'Share Tech Mono',monospace; font-size:0.65rem;
  letter-spacing:0.1em; color:var(--pale);
}
.rank-chevron { color:var(--pale); font-size:0.7rem; transition:transform 0.25s; }
.rank-section.open .rank-chevron { transform:rotate(180deg); }

.members-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:1px; background:rgba(122,0,0,0.08);
  max-height:0; overflow:hidden; transition:max-height 0.4s ease;
}
.rank-section.open .members-grid { max-height:2000px; }

.member-card {
  background:var(--coal); padding:0.9rem 1rem;
  display:flex; align-items:center; gap:0.8rem;
  transition:background 0.2s;
}
.member-card:hover { background:rgba(122,0,0,0.06); }
.member-avatar {
  width:32px; height:32px; border-radius:50%;
  border:1px solid rgba(122,0,0,0.3); object-fit:cover; flex-shrink:0;
}
.member-name { font-size:0.95rem; color:var(--bone); line-height:1.3; }
.member-trial {
  font-family:'Share Tech Mono',monospace; font-size:0.55rem;
  letter-spacing:0.1em; color:var(--blood-bright); display:block;
}

.loading {
  text-align:center; padding:4rem; color:var(--pale); font-style:italic;
}
.error-msg {
  text-align:center; padding:3rem; color:#e88;
  border:1px solid rgba(192,57,43,0.2); background:rgba(122,0,0,0.05);
}

@media(max-width:600px) {
  nav { padding:1rem 1.5rem; }
  .page-wrap { padding:6rem 1.5rem 3rem; }
  .stats-bar { gap:1.5rem; }
  .members-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">P·B</a>
  <a href="index.html" class="nav-back">← Back to Site</a>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <span class="eyebrow">The Crew</span>
    <h1 class="page-title">Phantom Bloodline Roster</h1>
  </div>

  <div id="loading" class="loading">Loading roster...</div>
  <div id="error" class="error-msg" style="display:none">Failed to load roster. Please try again later.</div>

  <div id="roster-content" style="display:none">
    <div class="stats-bar">
      <div class="stat-item"><span class="stat-num" id="stat-total">—</span><span class="stat-lbl">Total Members</span></div>
      <div class="stat-item"><span class="stat-num" id="stat-trials">—</span><span class="stat-lbl">Active Trials</span></div>
      <div class="stat-item"><span class="stat-num" id="stat-ranks">—</span><span class="stat-lbl">Active Ranks</span></div>
    </div>
    <div class="updated" id="updated-at"></div>
    <div id="ranks-container"></div>
  </div>
</div>

<script>
async function loadRoster() {
  try {
    const res = await fetch('data/roster.json?t=' + Date.now());
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('roster-content').style.display = 'block';

    document.getElementById('stat-total').textContent = data.totalMembers;
    document.getElementById('stat-trials').textContent = data.trialCount;
    document.getElementById('stat-ranks').textContent = data.ranks.length;

    const updated = new Date(data.updatedAt);
    document.getElementById('updated-at').textContent =
      'Last updated: ' + updated.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });

    const container = document.getElementById('ranks-container');

    for (const rank of data.ranks) {
      const section = document.createElement('div');
      section.className = 'rank-section open';

      const header = document.createElement('div');
      header.className = 'rank-header';
      header.innerHTML = `
        <span>${rank.emoji}</span>
        <span class="rank-header-name">${rank.name}</span>
        <span class="rank-count">${rank.count} member${rank.count !== 1 ? 's' : ''}</span>
        <span class="rank-chevron">▲</span>
      `;
      header.addEventListener('click', () => section.classList.toggle('open'));

      const grid = document.createElement('div');
      grid.className = 'members-grid';

      for (const member of rank.members) {
        const card = document.createElement('div');
        card.className = 'member-card';
        card.innerHTML = `
          <img class="member-avatar" src="${member.avatar}" alt="${member.displayName}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
          <div>
            <div class="member-name">${escapeHtml(member.displayName)}</div>
            ${member.isTrial ? '<span class="member-trial">TRIAL</span>' : ''}
          </div>
        `;
        grid.appendChild(card);
      }

      section.appendChild(header);
      section.appendChild(grid);
      container.appendChild(section);
    }

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    console.error(err);
  }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadRoster();
</script>
</body>
</html>
